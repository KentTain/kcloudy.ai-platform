# Docker Compose - Infrastructure Services
# 基础设施服务：数据库、缓存、对象存储、网关等

services:
  # ============================================
  # Gateway & Reverse Proxy
  # ============================================
  nginx:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/nginx:alpine
    container_name: kcloudy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/mime.types:/etc/nginx/mime.types:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Databases
  # ============================================
  postgres:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/pgvector:pg17
    container_name: kcloudy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-init_project}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/mysql:8.0.26
    container_name: kcloudy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kcloudy}
      MYSQL_USER: ${MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-admin123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  sqlserver:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/mssql-server:2019-latest
    container_name: kcloudy-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: ${MSSQL_ACCEPT_EULA:-Y}
      SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}' -Q 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # Cache
  # ============================================
  redis:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/redis:7-alpine
    container_name: kcloudy-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Object Storage
  # ============================================
  minio:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/minio:latest
    container_name: kcloudy-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================
  # Registry
  # ============================================
  nexus:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/nexus3:latest
    container_name: kcloudy-nexus
    restart: unless-stopped
    environment:
      NEXUS_SECURITY_RANDOMPASSWORD: "false"
      NEXUS_ADMIN_USERNAME: ${NEXUS_ADMIN_USERNAME:-admin}
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD:-admin123}
      MIN_HEAP: 512m
      MAX_HEAP: 1024m
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:MaxDirectMemorySize=1024m"
    ports:
      - "${NEXUS_PORT:-9090}:8081"
      - "${NEXUS_DOCKER_PORT:-9091}:8082"
      - "${NEXUS_MAVEN_PORT:-9092}:8083"
    volumes:
      - nexus_data:/nexus-data
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s

  # ============================================
  # AI Services
  # ============================================
  claude-code-hub:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/claude-code-hub:latest
    container_name: kcloudy-claude-hub
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DSN: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-init_project}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      ADMIN_TOKEN: ${CC_ADMIN_TOKEN:-your_secure_admin_token_here}
      AUTO_MIGRATE: "true"
      ENABLE_RATE_LIMIT: "true"
      SESSION_TTL: "300"
      TZ: Asia/Shanghai
    ports:
      - "${CC_HUB_PORT:-23000}:3000"
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  kcloudy-network:
    name: kcloudy-network
    driver: bridge

volumes:
  postgres_data:
  mysql_data:
  sqlserver_data:
  redis_data:
  minio_data:
  nexus_data:
