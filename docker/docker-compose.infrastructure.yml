# Docker Compose - Infrastructure Services
# 基础设施服务：数据库、缓存、对象存储、网关等

services:
  # ============================================
  # Gateway & Reverse Proxy
  # ============================================
  nginx:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/nginx:alpine
    container_name: kcloudy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /share/k8s-master/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /share/k8s-master/nginx/mime.types:/etc/nginx/mime.types:ro
      - /share/k8s-master/nginx/proxy_params:/etc/nginx/proxy_params:ro
      - /share/k8s-master/nginx/snippets:/etc/nginx/snippets:ro
      - /share/k8s-master/nginx/conf.d:/etc/nginx/conf.d:ro
      - /share/k8s-master/nginx/certs:/etc/nginx/certs:ro
      - /share/k8s-master/nginx/html:/usr/share/nginx/html:ro
      - /share/k8s-master/nginx/logs:/var/log/nginx
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Databases
  # ============================================
  postgres:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/pgvector:pg17
    container_name: kcloudy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - /share/k8s-master/data/postgres:/var/lib/postgresql/data
      - /share/k8s-master/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/mysql:8.0.26
    container_name: kcloudy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kcloudy}
      MYSQL_USER: ${MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-admin123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - /share/k8s-master/data/mysql/log:/var/log/mysql
      - /share/k8s-master/data/mysql/data:/var/lib/mysql
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # sqlserver:
  #   image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/mssql-server:2019-latest
  #   container_name: kcloudy-sqlserver
  #   restart: unless-stopped
  #   environment:
  #     ACCEPT_EULA: ${MSSQL_ACCEPT_EULA:-Y}
  #     SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
  #     MSSQL_PID: ${MSSQL_PID:-Developer}
  #   ports:
  #     - "${MSSQL_PORT:-1433}:1433"
  #   volumes:
  #     - /share/k8s-master/data/sqlserver/log:/var/log/mssql
  #     - /share/k8s-master/data/sqlserver/data:/var/opt/mssql
  #   networks:
  #     - kcloudy-network
  #   healthcheck:
  #     test:
  #       [
  #         "CMD-SHELL",
  #         "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}' -Q 'SELECT 1'",
  #       ]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

  # ============================================
  # Cache
  # ============================================
  redis:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/redis:7-alpine
    container_name: kcloudy-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - /share/k8s-master/data/redis:/data
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Object Storage
  # ============================================
  minio:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/minio:latest
    container_name: kcloudy-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - /share/k8s-master/data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Bucket 初始化（创建 happy bucket）
  minio-init:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/minio-mc:2024.11.05
    container_name: kcloudy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/happy --ignore-existing;
      mc anonymous set download myminio/happy;
      echo 'MinIO bucket happy initialized';
      "
    networks:
      - kcloudy-network

  # ============================================
  # Registry
  # ============================================
  nexus:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/nexus3:latest
    container_name: kcloudy-nexus
    restart: unless-stopped
    environment:
      NEXUS_SECURITY_RANDOMPASSWORD: "false"
      NEXUS_ADMIN_USERNAME: ${NEXUS_ADMIN_USERNAME:-admin}
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD:-admin123}
      MIN_HEAP: 512m
      MAX_HEAP: 1024m
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:MaxDirectMemorySize=1024m"
      INSTALL4J_ADD_VM_PARAMS: "-Xms1024m -Xmx1024m -XX:MaxDirectMemorySize=1024m"
    ports:
      - "${NEXUS_PORT:-9090}:8081"
      - "${NEXUS_DOCKER_PORT:-9091}:8082"
      - "${NEXUS_MAVEN_PORT:-9092}:8083"
    volumes:
      - /share/k8s-master/data/nexus/data:/nexus-data
    networks:
      - kcloudy-network
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s

networks:
  kcloudy-network:
    name: kcloudy-network
    external: true
