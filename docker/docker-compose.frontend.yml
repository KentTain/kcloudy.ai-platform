# Docker Compose - Frontend Services
# Vue 前端服务：支持平台版和独立模块版

services:
  # ============================================
  # Platform Version - All Modules
  # ============================================
  platform-app:
    build:
      context: ../web/vue
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: demo,iam,tenant
    image: init-project-platform:${VERSION:-latest}
    container_name: init-project-platform
    restart: unless-stopped
    ports:
      - "${PLATFORM_PORT:-3000}:80"
    environment:
      - MODULE_BASE_PATH=/
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    depends_on:
      backend-platform-api:
        condition: service_healthy
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Standalone Modules (profile: standalone)
  # ============================================
  demo-app:
    build:
      context: ../web/vue
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: demo
    image: init-project-demo:${VERSION:-latest}
    container_name: init-project-demo
    restart: unless-stopped
    ports:
      - "${DEMO_PORT:-3010}:80"
    environment:
      - MODULE_BASE_PATH=/
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    depends_on:
      backend-demo-api:
        condition: service_healthy
    networks:
      - kcloudy-network
    profiles:
      - standalone
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  iam-app:
    build:
      context: ../web/vue
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: iam
    image: init-project-iam:${VERSION:-latest}
    container_name: init-project-iam
    restart: unless-stopped
    ports:
      - "${IAM_PORT:-3020}:80"
    environment:
      - MODULE_BASE_PATH=/
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    depends_on:
      backend-iam-api:
        condition: service_healthy
    networks:
      - kcloudy-network
    profiles:
      - standalone
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  tenant-app:
    build:
      context: ../web/vue
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: tenant
    image: init-project-tenant:${VERSION:-latest}
    container_name: init-project-tenant
    restart: unless-stopped
    ports:
      - "${TENANT_PORT:-3030}:80"
    environment:
      - MODULE_BASE_PATH=/
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    depends_on:
      backend-tenant-api:
        condition: service_healthy
    networks:
      - kcloudy-network
    profiles:
      - standalone
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  kcloudy-network:
    name: kcloudy-network
