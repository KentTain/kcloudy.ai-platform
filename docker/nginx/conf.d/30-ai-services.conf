# AI 服务网关

server {
    listen 80;
    server_name cc-hub.kcloudy.com claw.kcloudy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cc-hub.kcloudy.com;

    include /etc/nginx/snippets/ssl.conf;

    access_log /var/log/nginx/ai-services_access.log main;
    error_log /var/log/nginx/ai-services_error.log warn;

    location / {
        proxy_pass http://claude-code-hub:3000;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 443 ssl http2;
    server_name claw.kcloudy.com;

    include /etc/nginx/snippets/ssl.conf;

    access_log /var/log/nginx/ai-services_access.log main;
    error_log /var/log/nginx/ai-services_error.log warn;

    location / {
        proxy_pass http://host.docker.internal:18789;
        include /etc/nginx/proxy_params;
    }
}
