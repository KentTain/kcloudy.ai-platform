# AI 服务网关

server {
    listen 80;
    server_name cc-hub.kcloudy.com claw.kcloudy.com coder.kcloudy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cc-hub.kcloudy.com;

    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/error-pages.conf;

    access_log /var/log/nginx/cc-hub_access.log main;
    error_log /var/log/nginx/cc-hub_error.log warn;

    location / {
        proxy_pass http://claude-code-hub:3000;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 443 ssl http2;
    server_name claw.kcloudy.com;

    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/error-pages.conf;

    access_log /var/log/nginx/claw_access.log main;
    error_log /var/log/nginx/claw_error.log warn;

    location / {
        proxy_pass http://openclaw-gateway:18789;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 443 ssl;
    server_name coder.kcloudy.com;

    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/error-pages.conf;

    access_log /var/log/nginx/coder_access.log main;
    error_log /var/log/nginx/coder_error.log warn;

    # Main proxy with WebSocket support
    location / {
        proxy_pass http://happy-server:3005;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long connection timeout (1 hour)
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # Buffer config
        proxy_buffering off;
        proxy_request_buffering off;
    }
}