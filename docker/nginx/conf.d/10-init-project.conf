# AI Platform 应用网关

server {
    listen 80;
    server_name platform.kcloudy.com demo.kcloudy.com iam.kcloudy.com tenant.kcloudy.com api.kcloudy.com demo-api.kcloudy.com iam-api.kcloudy.com tenant-api.kcloudy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name platform.kcloudy.com;

    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/error-pages.conf;

    access_log /var/log/nginx/platform_access.log main;
    error_log /var/log/nginx/platform_error.log warn;

    location /api/ {
        proxy_pass http://backend-platform-api:8080/;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://platform-app:80;
        include /etc/nginx/proxy_params;
    }
}

