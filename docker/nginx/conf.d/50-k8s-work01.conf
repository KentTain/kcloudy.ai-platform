# K8s ÚŤćšżĄŠťŹňŐíšŻĹňů│ - Work01 ŔŐéšé╣
# ń╗úšÉćňł░ K8s-Work01 (172.23.160.15) šÜäŠťŹňŐí

server {
    listen 80;
    server_name ~^(.*)\.cfg\.kcloudy\.com$ ~^(.*)\.dic\.kcloudy\.com$ ~^(.*)\.app\.kcloudy\.com$ ~^(.*)\.msg\.kcloudy\.com$ ~^(.*)\.cfgapi\.kcloudy\.com$ ~^(.*)\.dicapi\.kcloudy\.com$ ~^(.*)\.appapi\.kcloudy\.com$ ~^(.*)\.msgapi\.kcloudy\.com$;
    return 301 https://$host$request_uri;
}

# Web šźÖšé╣
server {
    listen 443 ssl http2;
    server_name ~^(.*)\.cfg\.kcloudy\.com$;

    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/error-pages.conf;

    access_log /var/log/nginx/k8s-work01_access.log main;
    error_log /var/log/nginx/k8s-work01_error.log warn;

    location / {
        proxy_pass http://172.23.160.15:1101;
        include /etc/nginx/proxy_params;
    }
}

