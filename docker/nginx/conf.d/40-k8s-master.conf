# K8s 集群服务网关 - Master 节点
# 代理到 K8s-Master (172.23.160.12) 的服务

server {
    listen 80;
    server_name nexus.kcloudy.com sso.kcloudy.com admin.kcloudy.com adminapi.kcloudy.com blog.kcloudy.com code.kcloudy.com resource.kcloudy.com ~^(.+)\.sso\.kcloudy\.com$;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nexus.kcloudy.com;

    include /etc/nginx/snippets/ssl.conf;

    access_log /var/log/nginx/k8s-master_access.log main;
    error_log /var/log/nginx/k8s-master_error.log warn;

    location / {
        proxy_pass http://172.23.160.12:9090;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 443 ssl http2;
    server_name sso.kcloudy.com ~^(.+)\.sso\.kcloudy\.com$;

    include /etc/nginx/snippets/ssl.conf;

    access_log /var/log/nginx/k8s-master_access.log main;
    error_log /var/log/nginx/k8s-master_error.log warn;

