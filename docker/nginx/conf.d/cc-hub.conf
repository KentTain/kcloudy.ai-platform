
# =========claude hub Gateway=========
# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name cc-hub.kcloudy.com;
    access_log /var/log/nginx/kcloudy_80_access.log main;
    error_log /var/log/nginx/kcloudy_80_error.log warn;
    return 301 https://$host$request_uri;
}

# HTTPS 配置
server {
    listen 443 ssl http2;
    server_name cc-hub.kcloudy.com;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling off;
    ssl_stapling_verify off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 独立日志配置
    access_log /var/log/nginx/kcloudy_443_access.log main;
    error_log /var/log/nginx/kcloudy_443_error.log warn;

    # 错误页面配置
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # claude hub Gateway 代理 (端口 23000)
    location / {
        proxy_pass http://127.0.0.1:23000;
        include /etc/nginx/proxy_params;
    }
}
