# ń╗úšÉćňł░ K8s-Work02 (172.23.160.17) šÜäŠťŹňŐí

server {
    listen 80;
    server_name ~^(.*)\.acc\.kcloudy\.com$ ~^(.*)\.doc\.kcloudy\.com$ ~^(.*)\.portal\.kcloudy\.com$ ~^(.*)\.accapi\.kcloudy\.com$ ~^(.*)\.docapi\.kcloudy\.com$ ~^(.*)\.crmapi\.kcloudy\.com$ ~^(.*)\.portalapi\.kcloudy\.com$ ~^(.*)\.flowapi\.kcloudy\.com$;
    return 301 https://$host$request_uri;
}

# Web šźÖšé╣
server {
    listen 443 ssl http2;
    server_name ~^(.*)\.acc\.kcloudy\.com$;

    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/error-pages.conf;

    access_log /var/log/nginx/k8s-work02_access.log main;
    error_log /var/log/nginx/k8s-work02_error.log warn;

    location / {
        proxy_pass http://172.23.160.17:2001;
        include /etc/nginx/proxy_params;
    }
}

