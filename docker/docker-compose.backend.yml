    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kcloudy-network
    profiles:
      - standalone

  backend-iam-api:
    build:
      context: ../server/python
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: iam
        APP_ROLE: web
    image: init-project-backend-iam:${VERSION:-latest}
    container_name: init-project-backend-iam-api
    restart: unless-stopped
    ports:
