# Docker Compose - Backend Services
# Python FastAPI 后端服务：支持平台版和独立模块版

services:
  # ============================================
  # Platform Version - All Modules
  # ============================================
  backend-platform-api:
    build:
      context: ../server/python
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: demo,iam,tenant
        APP_ROLE: web
    image: init-project-backend-platform:${VERSION:-latest}
    container_name: init-project-backend-platform-api
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/init_project}
      - REDIS_URL=${REDIS_URL:-redis://:redis123@redis:6379}
      - APP_ROLE=web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend-platform-task:
    build:
      context: ../server/python
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: demo,iam,tenant
        APP_ROLE: task
    image: init-project-backend-platform:${VERSION:-latest}
    container_name: init-project-backend-platform-task
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/init_project}
      - REDIS_URL=${REDIS_URL:-redis://:redis123@redis:6379}
      - APP_ROLE=task
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'application_task' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend-platform-listener:
    build:
      context: ../server/python
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: demo,iam,tenant
        APP_ROLE: listener
    image: init-project-backend-platform:${VERSION:-latest}
    container_name: init-project-backend-platform-listener
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/init_project}
      - REDIS_URL=${REDIS_URL:-redis://:redis123@redis:6379}
      - APP_ROLE=listener
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kcloudy-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'application_listener' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # Standalone Modules (profile: standalone)
  # ============================================
  backend-demo-api:
    build:
      context: ../server/python
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: demo
        APP_ROLE: web
    image: init-project-backend-demo:${VERSION:-latest}
    container_name: init-project-backend-demo-api
    restart: unless-stopped
    ports:
      - "${BACKEND_DEMO_PORT:-8010}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/init_project}
      - REDIS_URL=${REDIS_URL:-redis://:redis123@redis:6379}
      - APP_ROLE=web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kcloudy-network
    profiles:
      - standalone
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend-demo-task:
    build:
      context: ../server/python
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: demo
