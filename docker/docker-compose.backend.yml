      retries: 3
      start_period: 30s

  backend-tenant-api:
    build:
      context: ../server/python
      dockerfile: Dockerfile
      args:
        BUILD_MODULES: tenant
        APP_ROLE: web
    image: init-project-backend-tenant:${VERSION:-latest}
    container_name: init-project-backend-tenant-api
    restart: unless-stopped
    ports:
      - "${BACKEND_TENANT_PORT:-8030}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/init_project}
      - REDIS_URL=${REDIS_URL:-redis://:redis123@redis:6379}
      - APP_ROLE=web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kcloudy-network
    profiles:
      - standalone
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
