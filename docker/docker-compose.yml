version: "3.8"

services:
  nginx:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/nginx:latest
    container_name: mynginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /share/k8s-master/nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - /share/k8s-master/nginx/conf/conf.d:/etc/nginx/conf.d
      - /share/k8s-master/nginx/certs:/etc/nginx/certs
      - /share/k8s-master/nginx/html:/usr/share/nginx/html
      - /share/k8s-master/nginx/logs:/var/log/nginx
    networks:
      - alon-network

  nexus:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/nexus3:latest
    container_name: nexus
    restart: always
    ports:
      - "9090:8081"
      - "9091:8082"
      - "9092:8083"
    volumes:
      - /share/k8s-master/data/nexus/data:/nexus-data
    environment:
      NEXUS_SECURITY_RANDOMPASSWORD: "false"
      NEXUS_ADMIN_USERNAME: ${NEXUS_ADMIN_USERNAME:-admin}
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD:-admin123}
      MIN_HEAP: 512m
      MAX_HEAP: 1024m
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:MaxDirectMemorySize=1024m"
      INSTALL4J_ADD_VM_PARAMS: "-Xms1024m -Xmx1024m -XX:MaxDirectMemorySize=1024m"
    networks:
      - alon-network

  mysql:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/mysql:8.0.26
    container_name: mysql-db
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-YourStrong!Passw0rd}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-testdb}
      MYSQL_USER: ${MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Password}
    volumes:
      - /share/k8s-master/mysql/log:/var/log/mysql
      - /share/k8s-master/mysql/data:/var/lib/mysql
      - /share/k8s-master/mysql/config/my.cnf:/etc/mysql/my.cnf
    networks:
      - alon-network

  sqlserver:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/mssql-server:2019-latest
    container_name: sqlserver-db
    user: root
    restart: always
    env_file:
      - .env
    environment:
      MSSQL_AGENT_ENABLED: "true"
      ACCEPT_EULA: ${MSSQL_ACCEPT_EULA:-Y}
      SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    ports:
      - "1433:1433"
    volumes:
      - ./data/sqlserver:/var/opt/mssql
      - ./mssql-scripts:/scripts
    networks:
      - alon-network

  postgres:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/pgvector:pg17
    container_name: pgvector-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alon}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alon-network

  redis:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/redis:7-alpine
    container_name: redis-cache
    restart: always
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alon-network

  minio:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/minio:latest
    container_name: minio-storage
    restart: always
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - alon-network

  claude-app:
    image: registry.cn-zhangjiakou.aliyuncs.com/kcloudy-images/claude-code-hub:latest
    container_name: claude-code-hub
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库连接配置：指向你现有的 postgres 服务
      # 注意：这里使用的是容器名 "postgres" 作为主机名，端口是容器内部的 5432
      DSN: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${APP_DB:-alon}

      # Redis 连接配置：指向你现有的 redis 服务
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379

      # 其他必要环境变量
      ADMIN_TOKEN: ${CC_ADMIN_TOKEN:-your_secure_admin_token_here} # 登录后台的令牌，建议在 .env 中设置
      AUTO_MIGRATE: "true"
      ENABLE_RATE_LIMIT: "true"
      SESSION_TTL: "300"
      TZ: Asia/Shanghai
    ports:
      - "23000:3000" # 映射端口，外部访问 23000，容器内部是 3000
    networks:
      - alon-network

networks:
  alon-network:
    driver: bridge
