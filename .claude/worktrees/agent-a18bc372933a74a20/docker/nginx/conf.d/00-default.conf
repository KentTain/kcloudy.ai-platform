# 默认 HTTPS 服务器，捕获所有未匹配的 HTTPS 请求
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    include /etc/nginx/snippets/ssl.conf;

    return 444;
}

# 默认 HTTP 服务器，重定向到 HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 301 https://$host$request_uri;
}
