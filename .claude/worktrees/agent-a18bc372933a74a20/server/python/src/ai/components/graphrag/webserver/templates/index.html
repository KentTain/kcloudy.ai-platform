<!DOCTYPE html>
<html>
    <head>
        <title>FLY GraphRAG Web Server</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f6f8fa;
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                color: #24292e;
            }
            .container {
                max-width: 800px;
                width: 100%;
                background-color: #fff;
                padding: 20px;
                box-shadow: 0 1px 3px rgba(27, 31, 35, 0.12), 0 8px 24px rgba(27, 31, 35, 0.12);
                border-radius: 6px;
            }
            h2 {
                color: #0366d6;
                font-size: 1.75em;
                border-bottom: 1px solid #e1e4e8;
                padding-bottom: 0.3em;
            }
            h3 {
                color: #0366d6;
                font-size: 1.5em;
            }
            p {
                line-height: 1.5;
                font-size: 1em;
            }
            .wechat-img {
                display: block;
                margin: 20px auto;
                width: 400px;
                height: 105px;
                border: 1px solid #d1d5da;
                border-radius: 6px;
            }
            ul {
                padding-left: 20px;
            }
            ul li {
                margin: 5px 0;
            }
            .contact, .project {
                margin-bottom: 20px;
            }
            .footer {
                text-align: center;
                margin-top: 20px;
                color: #586069;
                font-size: 0.9em;
            }
            a {
                color: #0366d6;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>FLY GraphRAG Web Server</h2>
        </div>
    </body>
</html>
