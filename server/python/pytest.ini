[pytest]
minversion = 8.0.0
asyncio_default_fixture_loop_scope = function

# encoding settings
doctest_encoding = utf-8
ini_file_encoding = utf-8

# test exclusions
norecursedirs = .git .venv venv env __pycache__ migrations node_modules

# logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = [%(levelname)s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# markers
markers =
    slow: slow running tests
    integration: integration tests
    unit: unit tests
    api: API tests
    db: database related tests

# timeout (seconds)
# timeout = 300

# options
addopts =
    --import-mode=importlib
    --no-header
    -s
    -q

# test paths
pythonpath = src/demo src/ai src/ai_plugin

# ignore warnings
filterwarnings =
    ignore::DeprecationWarning:asyncpg
    ignore::DeprecationWarning:sqlalchemy
