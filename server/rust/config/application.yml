# Demo 基础配置

# 应用名称
name: demo

# 服务器配置
server:
  host: 0.0.0.0
  port: 8000
  debug: false
  timeout: 30
  body_limit: 10485760  # 10MB

# 日志配置
logging:
  level: INFO
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name}:{function}:{line} | {message}"

# 数据库配置
database:
  url: postgresql://postgres:postgres@localhost:5432/demo
  max_connections: 10
  min_connections: 0
  connect_timeout: 30
  idle_timeout: 600
  echo: false

# Redis 配置
redis:
  url: redis://localhost:6379/0
  pool_size: 10
  timeout_ms: 5000

# AI 配置
ai:
  openai_api_key: ""
  openai_base_url: ""
  default_model: gpt-4o-mini
  embedding_model: text-embedding-3-small
